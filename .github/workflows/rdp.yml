name: Free Windows RDP + Tailscale

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Create RDP User
        shell: powershell
        run: |
          $Password = "RdpStrongPass2026!@#"
          $SecurePassword = ConvertTo-SecureString $Password -AsPlainText -Force

          New-LocalUser -Name "RDPUser" -Password $SecurePassword -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDPUser"

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          Write-Host "====================================="
          Write-Host "RDPUser : RDPUser"
          Write-Host "Şifre   : RdpStrongPass2026!@#"
          Write-Host "====================================="

      - name: Install and Login Tailscale
        shell: powershell
        run: |
          # Tailscale'i indir ve kur
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          Start-Process -FilePath "tailscale-setup.exe" -ArgumentList "/S" -Wait

          # Tailscale'i başlat ve login ol (auth key ile)
          # Aşağıdaki satırı kendi Tailscale auth key'inle değiştir
          & "C:\Program Files\Tailscale\tailscale.exe" up --auth-key="tskey-tskey-auth-tskey-auth-kjGK2Z4xJE11CNTRL-WbzgZUk6jqR8mutFCYE3rRLqDtQWiK2SP" --hostname="github-rdp"
